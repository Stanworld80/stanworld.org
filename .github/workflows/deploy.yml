name: Build & Deploy to o2switch

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Set up Java (required for some Android/Flutter tooling but nice to have)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'oracle'
          java-version: '17'

      # 3. Set up Flutter
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.9'
          channel: 'stable'
          cache: true

      # 4. Install Dependencies
      - name: Install Dependencies
        run: flutter pub get

      # 5. Build Web Application
      - name: Build Web
        run: flutter build web --release

      # 6. Deploy to o2switch via SFTP/FTP
      # This uses SamKirkland/FTP-Deploy-Action which is standard and secure.
      # You need to define FTP_SERVER, FTP_USERNAME, and FTP_PASSWORD in your GitHub Repository Secrets.
      - name: Deploy to Hosting
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./build/web/
          # If o2switch defaults to the root of your domain's FTP folder, leave this as ./
          # If you need to deploy specifically to public_html/, change this to public_html/
          server-dir: ./
          dangerous-clean-slate: false # Keep false to avoid deleting other files (e.g. subdomains/folders)
